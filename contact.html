<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quatre Pattes</title>

    <link rel="stylesheet" href="contact.css">
    <script src="script.js" defer></script>
    
    <link rel="icon" type="image/png" href="images/logo_black.png" />
</head>
<body>
    <header>
        <nav class="nav">
            <div class="espace nav-brand">
                <div class="icon_header"><img class="icon_header" src="images/icon_header.png" alt="Logo Quatre Pattes"></div>
                <button class="menu-close" id="closeMenu" type="button" aria-label="Fermer le menu">×</button>
            </div>
            <div class="espace nav-links" id="navLinks">
                <div class="menu" id="menu"><a href="index.html">Accueil</a></div>
                <div class="menu"><a href="contact.html">Contact</a></div>
                <div class="menu menu-don"><a class="don-link" href="index.html#don">Faire un don</a></div>
            </div>
        </nav>
    </header>
    <main>
        <h1>Contactez-nous</h1>

        <section class="contact">
            <form id="myForm" onsubmit="return validateForm()">
                <label class="text" id="nom">Nom</label>
                <input type="text" id="username">
                <div id="error-username" class="error"></div>

                <label class="text">Email</label>
                <input type="email" id="email">
                <div id="error-email" class="error"></div>

                <label class="text">Sujet</label>
                <select id="select">
                    <option value="">Choisissez une option</option>
                    <option value="questions">Question sur les dons</option>
                    <option value="partenariat">Devenir bénévole</option>
                    <option value="general">Questions générales</option>
                </select>
                <div id="error-select" class="error"></div>

                <label for="message" class="text">Message</label>
                <textarea id="message" name="message" placeholder="Votre message"></textarea>
                <div id="error-message" class="error"></div>

                <button id="button" type="submit"><img src="images/send.png" alt="Icone envoyer" loading="lazy">Envoyer</button>
            </form>
        </section>
    </main>
    <footer>
        <div class="pied">
            <div class="contact1">
                <p>Quatre Pattes</p>
                <p>Ensemble, protégeons les animaux et donnons-leur une vie meilleure.</p>
            </div>
            <div class="contact1">
                <p>Contact</p>
                    <div class="email">
                        <img src="images/mail.png" alt="Icone email" loading="lazy">
                        <figcaption class="figcaption">contact@quattrespattes.org</figcaption>
                    </div>
            </div>
            <div class="contact1">
                <p>Suivez-nous</p>
            </div>
        </div>
    </footer>
</body>
</html>
